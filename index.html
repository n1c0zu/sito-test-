<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PepperStats Pro - Advanced Agronomy</title>
    <style>
        /* =========================================
           STILE FRUTIGER AERO (RETRO-TECH & GLASS)
           ========================================= */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Trebuchet MS', 'Lucida Grande', 'Lucida Sans Unicode', Tahoma, sans-serif;
            background: radial-gradient(circle at 50% 0%, #74ebd5 0%, #9face6 50%, #2af598 100%);
            background-attachment: fixed;
            color: #013a63;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48ZyBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMTUiPjxjaXJjbGUgY3g9IjIwIiBjeT0iMjAiIHI9IjUiLz48Y2lyY2xlIGN4PSI4MCIgY3k9IjYwIiByPSIxMCIvPjxjaXJjbGUgY3g9IjQwIiBjeT0iODAiIHI9IjMiLz48L2c+PC9zdmc+');
            pointer-events: none;
            z-index: -1;
        }

        h1 {
            color: #ffffff;
            text-shadow: 0px 3px 6px rgba(0,0,0,0.3), 0 0 15px rgba(255,255,255,0.5);
            font-size: 2.8em;
            margin-bottom: 15px;
            letter-spacing: -1px;
            text-align: center;
        }

        .glass-panel {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.8) 0%, rgba(255, 255, 255, 0.4) 100%);
            border: 1px solid rgba(255, 255, 255, 1);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 50, 100, 0.15), inset 0 2px 10px rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            padding: 25px;
            width: 100%;
            max-width: 750px;
            margin-bottom: 25px;
            position: relative;
        }

        .controls { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 5px; position: relative; z-index: 5; }

        .search-wrapper { position: relative; display: inline-block; width: 260px; }
        
        input[type="text"] {
            padding: 12px 20px; border-radius: 30px; border: 1px solid #a2d2ff;
            background: rgba(255, 255, 255, 0.9); box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
            width: 100%; box-sizing: border-box; outline: none; font-family: inherit; font-size: 15px;
        }

        .suggestions-box {
            position: absolute; top: calc(100% + 5px); left: 0; width: 100%;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            border: 1px solid #a2d2ff; border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 50, 100, 0.2); overflow: hidden;
            z-index: 100; display: none; text-align: left; max-height: 250px; overflow-y: auto;
        }
        .suggestion-item {
            padding: 12px 15px; cursor: pointer; border-bottom: 1px solid rgba(0, 119, 182, 0.1);
            font-size: 0.9em; font-weight: bold; transition: 0.2s;
        }
        .suggestion-item:hover { background: linear-gradient(to right, #4facfe, #0088ff); color: white; }

        .glossy-btn {
            background: linear-gradient(to bottom, #4facfe 0%, #0088ff 100%);
            border: 1px solid #fff; border-radius: 30px; color: white;
            padding: 12px 24px; font-weight: bold; font-family: inherit; font-size: 15px;
            cursor: pointer; text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            box-shadow: 0 4px 15px rgba(0, 136, 255, 0.3), inset 0 2px 5px rgba(255,255,255,0.5);
            transition: all 0.2s ease-in-out;
        }
        .glossy-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-gps { background: linear-gradient(to bottom, #43e97b 0%, #38f9d7 100%); color: #005f56; text-shadow: none;}

        .temp-main { font-size: 4em; color: #ff5722; font-weight: 800; margin: 10px 0; text-shadow: 2px 2px 0px #fff;}

        /* Griglie Dati */
        .details-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-top: 20px;
        }
        .detail-item {
            background: rgba(255, 255, 255, 0.5); padding: 12px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.8); font-size: 0.9em; font-weight: bold;
        }
        .detail-item span { float: right; color: #005f56; font-weight: normal;}

        h3 { color: #013a63; border-bottom: 2px solid rgba(255,255,255,0.6); padding-bottom: 5px; margin-top: 30px;}

        /* Container Previsioni Orarie Migliorato */
        .hourly-container {
            display: flex; overflow-x: auto; gap: 12px; padding: 10px 5px; scrollbar-width: thin;
        }
        .hourly-container::-webkit-scrollbar { height: 8px; }
        .hourly-container::-webkit-scrollbar-thumb { background: #4facfe; border-radius: 10px; }

        .hourly-card {
            min-width: 85px; background: rgba(255,255,255,0.6); border-radius: 15px;
            padding: 12px 10px; border: 1px solid #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .h-time { font-weight: bold; color: #013a63; font-size: 0.9em; }
        .h-icon { font-size: 1.8em; }
        .h-temp { color: #ff5722; font-size: 1.2em; font-weight: bold; }
        .h-wind { font-size: 0.75em; color: #005f56; background: rgba(255,255,255,0.5); padding: 2px 6px; border-radius: 10px;}

        /* Container Previsioni Giornaliere */
        .daily-container {
            display: flex; flex-direction: column; gap: 8px; margin-top: 15px;
        }
        .daily-row {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.5); padding: 12px 20px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.8); font-weight: bold;
        }
        .d-day { width: 80px; color: #013a63; }
        .d-icon { font-size: 1.5em; width: 40px; text-align: center; }
        .d-rain { color: #0088ff; font-size: 0.9em; width: 60px; text-align: center;}
        .d-temp { color: #ff5722; width: 100px; text-align: right; }
        .d-temp span { color: #005f56; font-size: 0.9em; font-weight: normal; margin-left: 8px;}

        /* Box Consigli */
        .advice-box {
            margin-top: 30px; padding: 20px; border-radius: 15px; text-align: left;
            background: rgba(255,255,255,0.8); border: 1px solid #fff; font-size: 0.95em;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.8), 0 5px 15px rgba(0,0,0,0.05);
        }
        .advice-section { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(0, 119, 182, 0.2); }
        .advice-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .advice-title { color: #013a63; font-weight: bold; font-size: 1.1em; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }

        #loading { display: none; font-weight: bold; color: white; text-shadow: 1px 1px 4px rgba(0,0,0,0.3); margin-top: 15px; }
    </style>
</head>
<body>

    <h1>🌶️ PepperStats Pro</h1>
    
    <div class="glass-panel">
        <div class="controls">
            <div class="search-wrapper">
                <input type="text" id="cityInput" placeholder="Digita una città..." autocomplete="off">
                <div id="suggestionsBox" class="suggestions-box"></div>
            </div>
            <button class="glossy-btn btn-gps" onclick="useGPS()">📍 Auto-Loc</button>
        </div>
        <div id="loading">Sincronizzazione dati satellitari in corso...</div>
    </div>

    <div class="glass-panel" id="weatherCard" style="display: none;">
        <h2 id="locationName" style="margin:0; color: #013a63;">Località</h2>
        <p class="temp-main" id="tempDisplay">--°C</p>
        
        <div class="details-grid">
            <div class="detail-item">🌡️ Range Temp: <span id="tempRange">--</span></div>
            <div class="detail-item">💧 Umidità Rel.: <span id="humidity">--</span>%</div>
            <div class="detail-item">💨 Vento Max: <span id="windDisplay">--</span> km/h</div>
            <div class="detail-item">🌧️ Precipitazioni: <span id="rainDisplay">--</span> mm</div>
            <div class="detail-item">🟤 Temp. Suolo: <span id="soilTemp">--</span>°C</div>
            <div class="detail-item">🚰 Evapo/Trasp: <span id="et0">--</span> mm</div>
            <div class="detail-item">☀️ Indice UV: <span id="uvIndex">--</span></div>
            <div class="detail-item">☁️ Nuvole: <span id="clouds">--</span>%</div>
        </div>

        <h3>⏱️ Telemetria Prossime 24 Ore</h3>
        <div class="hourly-container" id="hourlyForecast"></div>

        <h3>📅 Previsione a 7 Giorni</h3>
        <div class="daily-container" id="dailyForecast"></div>
        
        <div id="adviceDisplay" class="advice-box"></div>
    </div>

    <script>
        const loadingDiv = document.getElementById('loading');
        const weatherCard = document.getElementById('weatherCard');
        const cityInput = document.getElementById('cityInput');
        const suggestionsBox = document.getElementById('suggestionsBox');
        let debounceTimer;

        // Funzione per interpretare i codici meteo
        function getWeatherIcon(code, isDay = 1) {
            if (code <= 1) return isDay ? "☀️" : "🌙";
            if (code <= 3) return isDay ? "⛅" : "☁️";
            if (code <= 49) return "🌫️";
            if (code <= 69) return "🌧️";
            if (code <= 79) return "❄️";
            if (code <= 99) return "⛈️";
            return "☁️";
        }

        function getDayName(dateStr, isToday) {
            if (isToday) return "Oggi";
            const days = ["Dom", "Lun", "Mar", "Mer", "Gio", "Ven", "Sab"];
            return days[new Date(dateStr).getDay()];
        }

        cityInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            const query = e.target.value.trim();
            if (query.length < 2) { suggestionsBox.style.display = 'none'; return; }

            debounceTimer = setTimeout(async () => {
                try {
                    const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${query}&count=5&language=it&format=json`);
                    const data = await res.json();
                    if (data.results) {
                        suggestionsBox.innerHTML = '';
                        data.results.forEach(city => {
                            const div = document.createElement('div');
                            div.className = 'suggestion-item';
                            div.innerHTML = `${city.name} <br><span style="font-size:0.8em; font-weight:normal;">${city.admin1 || ''}, ${city.country || ''}</span>`;
                            div.onclick = () => {
                                cityInput.value = city.name;
                                suggestionsBox.style.display = 'none';
                                fetchWeather(city.latitude, city.longitude, city.name);
                            };
                            suggestionsBox.appendChild(div);
                        });
                        suggestionsBox.style.display = 'block';
                    }
                } catch (err) {}
            }, 300);
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-wrapper')) suggestionsBox.style.display = 'none';
        });

        function useGPS() {
            if (navigator.geolocation) {
                loadingDiv.style.display = 'block'; weatherCard.style.display = 'none';
                cityInput.value = '';
                navigator.geolocation.getCurrentPosition(
                    (p) => fetchWeather(p.coords.latitude, p.coords.longitude, "Coordinate Locali"),
                    () => { alert("GPS non disponibile."); loadingDiv.style.display = 'none'; }
                );
            }
        }

        async function fetchWeather(lat, lon, locName) {
            loadingDiv.style.display = 'block'; weatherCard.style.display = 'none';
            try {
                // Aggiunto weathercode, is_day e forecast_days=7
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,precipitation,wind_speed_10m,cloud_cover,weathercode,is_day&hourly=temperature_2m,precipitation_probability,wind_speed_10m,soil_temperature_6cm,weathercode,is_day&daily=temperature_2m_max,temperature_2m_min,uv_index_max,et0_fao_evapotranspiration,weathercode,precipitation_sum&timezone=auto&forecast_days=7`;
                const res = await fetch(url);
                const data = await res.json();
                updateUI(locName, data);
            } catch (e) { alert("Errore di connessione API."); } finally { loadingDiv.style.display = 'none'; }
        }

        function updateUI(locName, data) {
            const current = data.current;
            const daily = data.daily;
            
            // Trova l'indice orario corretto corrispondente all'ora attuale
            const now = new Date();
            let currentIndex = data.hourly.time.findIndex(t => new Date(t) >= now);
            if (currentIndex === -1) currentIndex = 0;

            document.getElementById('locationName').innerText = locName;
            document.getElementById('tempDisplay').innerText = current.temperature_2m + "°";
            document.getElementById('tempRange').innerText = daily.temperature_2m_max[0] + "° / " + daily.temperature_2m_min[0] + "°";
            document.getElementById('humidity').innerText = current.relative_humidity_2m;
            document.getElementById('windDisplay').innerText = current.wind_speed_10m;
            document.getElementById('rainDisplay').innerText = current.precipitation;
            document.getElementById('soilTemp').innerText = data.hourly.soil_temperature_6cm[currentIndex];
            document.getElementById('et0').innerText = daily.et0_fao_evapotranspiration[0];
            document.getElementById('uvIndex').innerText = daily.uv_index_max[0];
            document.getElementById('clouds').innerText = current.cloud_cover;

            // --- RENDER 24 ORE (Migliorato) ---
            const hourlyContainer = document.getElementById('hourlyForecast');
            hourlyContainer.innerHTML = ''; 
            // Mostra le prossime 24 ore a intervalli di 2 ore
            for (let i = currentIndex; i < currentIndex + 24; i += 2) {
                if (i >= data.hourly.time.length) break;
                const timeObj = new Date(data.hourly.time[i]);
                const timeStr = timeObj.getHours().toString().padStart(2, '0') + ":00";
                const icon = getWeatherIcon(data.hourly.weathercode[i], data.hourly.is_day[i]);
                
                hourlyContainer.innerHTML += `
                    <div class="hourly-card">
                        <div class="h-time">${timeStr}</div>
                        <div class="h-icon">${icon}</div>
                        <div class="h-temp">${data.hourly.temperature_2m[i]}°</div>
                        <div class="h-wind">💨 ${data.hourly.wind_speed_10m[i]}</div>
                    </div>`;
            }

            // --- RENDER 7 GIORNI ---
            const dailyContainer = document.getElementById('dailyForecast');
            dailyContainer.innerHTML = '';
            for (let i = 0; i < 7; i++) {
                const dayName = getDayName(daily.time[i], i === 0);
                const icon = getWeatherIcon(daily.weathercode[i], 1);
                const rain = daily.precipitation_sum[i] > 0 ? `💧 ${daily.precipitation_sum[i]}mm` : "";
                
                dailyContainer.innerHTML += `
                    <div class="daily-row">
                        <div class="d-day">${dayName}</div>
                        <div class="d-icon">${icon}</div>
                        <div class="d-rain">${rain}</div>
                        <div class="d-temp">${daily.temperature_2m_max[i]}° <span>${daily.temperature_2m_min[i]}°</span></div>
                    </div>`;
            }

            // =========================================
            // NUOVO MOTORE LOGICO SPOSTAMENTI (Perfetto)
            // =========================================
            const adviceBox = document.getElementById('adviceDisplay');
            let reportHTML = "";

            // Calcolo finestre di freddo nelle prossime 24 ore
            let coldSpans = [];
            let currentSpan = null;

            for (let i = currentIndex; i < currentIndex + 24; i++) {
                if (i >= data.hourly.time.length) break;
                let temp = data.hourly.temperature_2m[i];
                let timeStr = new Date(data.hourly.time[i]).getHours().toString().padStart(2, '0') + ":00";
                
                if (temp < 8) {
                    if (!currentSpan) currentSpan = { start: timeStr, end: timeStr };
                    else currentSpan.end = timeStr;
                } else {
                    if (currentSpan) {
                        coldSpans.push(currentSpan);
                        currentSpan = null;
                    }
                }
            }
            if (currentSpan) coldSpans.push(currentSpan); // Chiude l'ultimo blocco se finisce al limite delle 24h

            let logisticAdvice = "";
            if (coldSpans.length > 0) {
                logisticAdvice = `<span style="color:red; font-weight:bold;">ALLERTA TERMICA (<8°C):</span> Le piante vanno protette all'interno. Fasce critiche rilevate: `;
                let spansText = coldSpans.map(span => {
                    if (span.start === span.end) return `alle ore ${span.start}`;
                    return `dalle ${span.start} fino alle ${span.end}`;
                }).join(" e ");
                logisticAdvice += `<strong>${spansText}</strong>. Rimuovere all'aperto solo fuori da questi orari.`;
            } else {
                logisticAdvice = "Condizioni di temperatura sicure. Le piante possono rimanere all'esterno per l'intero ciclo delle 24 ore.";
            }

            reportHTML += `
                <div class="advice-section">
                    <div class="advice-title">🌡️ Gestione Spostamenti</div>
                    <p style="margin:0; line-height:1.5;">${logisticAdvice}</p>
                </div>
            `;

            // --- Irrigazione ---
            let et0 = daily.et0_fao_evapotranspiration[0];
            let waterFreq = et0 > 5.0 ? "Quotidiana" : (et0 >= 2.5 ? "Ogni 2-3 giorni" : "Sospesa/Rara");
            reportHTML += `
                <div class="advice-section">
                    <div class="advice-title">💧 Irrigazione (Al netto della pioggia)</div>
                    <p style="margin:0;"><strong>Frequenza:</strong> ${waterFreq} (Evapotraspirazione: ${et0} mm)</p>
                </div>
            `;

            // --- Analisi Fitosanitaria ---
            let agroAdvice = [];
            if (daily.uv_index_max[0] >= 8) agroAdvice.push("Indice UV estremo. Acclimatare all'ombra le piante giovani.");
            let maxWind = Math.max(...data.hourly.wind_speed_10m.slice(currentIndex, currentIndex + 24));
            if (maxWind > 35) agroAdvice.push(`Raffiche di vento fino a ${maxWind} km/h. Controllare i tutori.`);
            if (agroAdvice.length === 0) agroAdvice.push("Parametri ambientali eccellenti.");

            reportHTML += `
                <div class="advice-section">
                    <div class="advice-title">🔬 Note Agronomiche</div>
                    <ul style="margin:0; padding-left:20px; line-height:1.5;">${agroAdvice.map(a => `<li>${a}</li>`).join('')}</ul>
                </div>
            `;

            adviceBox.innerHTML = reportHTML;
            weatherCard.style.display = 'block';
        }
    </script>
</body>
</html>
