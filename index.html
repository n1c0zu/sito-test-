<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PepperStats - Monitoraggio Peperoncini</title>
    <style>
        /* =========================================
           STILE FRUTIGER AERO (GLOSSY & FRESH)
           ========================================= */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Sfondo ultra-glossy tipico del 2005-2010 */
            background: radial-gradient(circle at 50% 0%, #74ebd5 0%, #9face6 50%, #2af598 100%);
            background-attachment: fixed;
            color: #013a63;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Effetto bolle decorative in background */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48ZyBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMTUiPjxjaXJjbGUgY3g9IjIwIiBjeT0iMjAiIHI9IjUiLz48Y2lyY2xlIGN4PSI4MCIgY3k9IjYwIiByPSIxMCIvPjxjaXJjbGUgY3g9IjQwIiBjeT0iODAiIHI9IjMiLz48L2c+PC9zdmc+');
            pointer-events: none;
            z-index: -1;
        }

        h1 {
            color: #ffffff;
            text-shadow: 0px 3px 6px rgba(0,0,0,0.2), 0 0 15px rgba(255,255,255,0.5);
            font-size: 2.8em;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        .glass-panel {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.7) 0%, rgba(255, 255, 255, 0.2) 100%);
            border: 2px solid rgba(255, 255, 255, 0.9);
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 50, 100, 0.15), inset 0 2px 10px rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            padding: 25px;
            width: 100%;
            max-width: 650px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        /* Riflesso lucido sul pannello */
        .glass-panel::after {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(30deg);
            pointer-events: none;
        }

        .controls { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 5px; }

        input[type="text"] {
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid #a2d2ff;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            width: 220px;
            outline: none;
        }

        .glossy-btn {
            background: linear-gradient(to bottom, #4facfe 0%, #0088ff 100%);
            border: 1px solid #fff;
            border-radius: 30px;
            color: white;
            padding: 12px 24px;
            font-weight: bold;
            cursor: pointer;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            box-shadow: 0 4px 15px rgba(0, 136, 255, 0.3), inset 0 2px 5px rgba(255,255,255,0.5);
            transition: 0.3s;
        }

        .glossy-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
        .btn-gps { background: linear-gradient(to bottom, #43e97b 0%, #38f9d7 100%); color: #005f56; }

        .temp-main { font-size: 4em; color: #ff6b35; font-weight: 800; margin: 10px 0; text-shadow: 2px 2px 0px #fff; }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            text-align: left;
            margin-top: 20px;
        }

        .detail-item {
            background: rgba(255, 255, 255, 0.4);
            padding: 10px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.5);
            font-size: 0.85em;
            font-weight: bold;
        }
        .detail-item span { float: right; color: #0077b6; }

        .hourly-container {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 15px 5px;
            scrollbar-width: thin;
        }
        .hourly-card {
            min-width: 90px;
            background: rgba(255,255,255,0.5);
            border-radius: 18px;
            padding: 12px;
            border: 1px solid #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .advice-box {
            margin-top: 20px;
            padding: 20px;
            border-radius: 20px;
            text-align: left;
            background: rgba(255,255,255,0.6);
            border: 1px solid #fff;
            font-size: 0.95em;
        }
        .advice-box ul { padding-left: 18px; margin: 10px 0 0 0; }
        .advice-box li { margin-bottom: 8px; }

        #loading { display: none; font-weight: bold; color: white; text-shadow: 1px 1px 4px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <h1>🌶️ PepperStats</h1>
    
    <div class="glass-panel">
        <div class="controls">
            <input type="text" id="cityInput" placeholder="Inserisci città...">
            <button class="glossy-btn" onclick="searchCity()">Aggiorna</button>
            <button class="glossy-btn btn-gps" onclick="useGPS()">📍 GPS</button>
        </div>
        <div id="loading">Recupero dati in corso...</div>
    </div>

    <div class="glass-panel" id="weatherCard" style="display: none;">
        <h2 id="locationName" style="margin:0; color: #0077b6;">Località</h2>
        <p class="temp-main" id="tempDisplay">--°C</p>
        
        <div class="details-grid">
            <div class="detail-item">🌡️ Max/Min: <span id="tempRange">--</span></div>
            <div class="detail-item">💧 Umidità: <span id="humidity">--</span>%</div>
            <div class="detail-item">💨 Vento: <span id="windDisplay">--</span> km/h</div>
            <div class="detail-item">🌧️ Pioggia: <span id="rainDisplay">--</span> mm</div>
            <div class="detail-item">🟤 Temp. Suolo: <span id="soilTemp">--</span>°C</div>
            <div class="detail-item">🚰 Evapo/Trasp: <span id="et0">--</span> mm</div>
            <div class="detail-item">☀️ Indice UV: <span id="uvIndex">--</span></div>
            <div class="detail-item">☁️ Nuvole: <span id="clouds">--</span>%</div>
        </div>

        <h3 style="margin-top:25px; color: #0077b6;">Prossime 24 ore</h3>
        <div class="hourly-container" id="hourlyForecast"></div>
        
        <div id="adviceDisplay" class="advice-box"></div>
    </div>

    <script>
        const loadingDiv = document.getElementById('loading');
        const weatherCard = document.getElementById('weatherCard');

        function useGPS() {
            if (navigator.geolocation) {
                loadingDiv.style.display = 'block';
                navigator.geolocation.getCurrentPosition(
                    (p) => fetchWeather(p.coords.latitude, p.coords.longitude, "Tua Posizione"),
                    () => { alert("GPS non disponibile."); loadingDiv.style.display = 'none'; }
                );
            }
        }

        async function searchCity() {
            const city = document.getElementById('cityInput').value;
            if (!city) return;
            loadingDiv.style.display = 'block';
            try {
                const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&language=it&format=json`);
                const data = await res.json();
                if (!data.results) throw new Error();
                fetchWeather(data.results[0].latitude, data.results[0].longitude, data.results[0].name);
            } catch (e) { alert("Città non trovata."); loadingDiv.style.display = 'none'; }
        }

        async function fetchWeather(lat, lon, locName) {
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,precipitation,wind_speed_10m,cloud_cover&hourly=temperature_2m,precipitation_probability,wind_speed_10m,soil_temperature_6cm&daily=temperature_2m_max,temperature_2m_min,uv_index_max,et0_fao_evapotranspiration&timezone=auto&forecast_days=2`;
                const res = await fetch(url);
                const data = await res.json();
                updateUI(locName, data);
            } catch (e) { alert("Errore connessione."); } finally { loadingDiv.style.display = 'none'; }
        }

        function updateUI(locName, data) {
            const current = data.current;
            const daily = data.daily;
            const hIndex = 0; 

            document.getElementById('locationName').innerText = locName;
            document.getElementById('tempDisplay').innerText = current.temperature_2m + "°";
            document.getElementById('tempRange').innerText = daily.temperature_2m_max[0] + "° / " + daily.temperature_2m_min[0] + "°";
            document.getElementById('humidity').innerText = current.relative_humidity_2m;
            document.getElementById('windDisplay').innerText = current.wind_speed_10m;
            document.getElementById('rainDisplay').innerText = current.precipitation;
            document.getElementById('soilTemp').innerText = data.hourly.soil_temperature_6cm[0];
            document.getElementById('et0').innerText = daily.et0_fao_evapotranspiration[0];
            document.getElementById('uvIndex').innerText = daily.uv_index_max[0];
            document.getElementById('clouds').innerText = current.cloud_cover;

            const hourlyContainer = document.getElementById('hourlyForecast');
            hourlyContainer.innerHTML = ''; 
            for (let i = 0; i < 24; i+=2) {
                const time = new Date(data.hourly.time[i]).getHours() + ":00";
                hourlyContainer.innerHTML += `
                    <div class="hourly-card">
                        <div style="font-weight:bold">${time}</div>
                        <div style="color:#ff6b35; font-size:1.1em">${data.hourly.temperature_2m[i]}°</div>
                        <div style="font-size:0.75em">💧${data.hourly.precipitation_probability[i]}%</div>
                    </div>`;
            }

            // =========================================
            // LOGICA PEPPERSTATS (SOGLIA 8°C)
            // =========================================
            const adviceBox = document.getElementById('adviceDisplay');
            let advice = [];
            const minT = daily.temperature_2m_min[0];
            const maxT = daily.temperature_2m_max[0];
            const et0 = daily.et0_fao_evapotranspiration[0];

            // 1. Temperatura (Nuova soglia 8°C richiesta)
            if (minT < 8) {
                advice.push("🚨 <strong>PERICOLO FREDDO:</strong> Minima di " + minT + "°C prevista. <strong>SPOSTA LE PIANTE IN CASA IMMEDIATAMENTE</strong>.");
            } else if (minT < 12) {
                advice.push("⚠️ <strong>Fresco:</strong> Minima tra 8 e 12°C. La crescita rallenta, valuta riparo notturno.");
            } else if (maxT > 34) {
                advice.push("☀️ <strong>Stress Termico:</strong> Picco di " + maxT + "°C. Possibile caduta fiori. Ombreggia.");
            }

            // 2. Acqua (Evapotraspirazione)
            if (et0 > 5) {
                advice.push("🚰 <strong>Irrigazione:</strong> Consumo idrico elevato ("+et0+"mm). Terriccio in rapida asciugatura.");
            }

            // 3. Vento e Parassiti
            if (current.wind_speed_10m > 30) advice.push("💨 <strong>Vento:</strong> Raffiche moderate. Proteggi i fusti più sottili.");
            if (current.relative_humidity_2m < 40 && current.temperature_2m > 25) {
                advice.push("🕷️ <strong>Rischio Acari:</strong> Caldo secco. Nebulizza acqua sulle foglie alla sera.");
            }

            if (advice.length === 0) advice.push("✅ Condizioni stabili. Nessuna azione richiesta.");

            adviceBox.innerHTML = "<strong>Statistiche e Consigli:</strong><ul>" + advice.map(a => `<li>${a}</li>`).join('') + "</ul>";
            weatherCard.style.display = 'block';
        }
    </script>
</body>
</html>
